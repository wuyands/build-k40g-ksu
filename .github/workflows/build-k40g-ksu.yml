name: 编译红米K40G KernelSU 内核

on:
  # 手动触发 — 可选择 KSU / KSU-Next
  workflow_dispatch:
    inputs:
      variant:
        description: 'KernelSU 版本 (不懂就保持默认)'
        required: true
        type: choice
        default: 'KernelSU'
        options:
          - 'KernelSU'
          - 'KernelSU-Next'
      defconfig:
        description: 'defconfig 名称 (不懂就保持默认)'
        required: true
        default: 'ares_user'
      kernel_branch:
        description: '内核源码分支 (留空则使用默认: KSU→T, KSU-Next→main)'
        required: false
        default: ''
      enable_kprobes:
        description: '强制开启 KPROBES (不懂就保持默认)'
        required: false
        default: 'true'
      boot_img_url:
        description: '原厂 stock boot.img 下载地址 (必填! 从你当前系统固件提取, 见 README 教程)'
        required: true
        default: ''

  # 每周一 UTC 00:00 自动编译 (同时编译 KSU + KSU-Next)
  schedule:
    - cron: '0 0 * * 1'

  # 推送到 main 分支时自动触发
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-k40g-ksu.yml'
      - 'build.sh'

env:
  # Magisk 版本 (用于获取 magiskboot 工具)
  MAGISK_VERSION: 'v27.0'

jobs:
  # ═══════════════════════════════════════════════════════════
  # 预处理：决定本次编译哪些变体以及对应分支
  # ═══════════════════════════════════════════════════════════
  prepare:
    name: 准备构建矩阵
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # KSU 仓库默认分支是 T, KSU-Next 默认分支是 main
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # 定时任务: 同时编译两个版本, 各用默认分支
            echo 'matrix={"include":[{"variant":"KernelSU","branch":"T"},{"variant":"KernelSU-Next","branch":"main"}]}' >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VAR="${{ github.event.inputs.variant }}"
            USER_BRANCH="${{ github.event.inputs.kernel_branch }}"
            if [ "$VAR" = "KernelSU-Next" ]; then
              DEFAULT_BRANCH="main"
            else
              DEFAULT_BRANCH="T"
            fi
            BRANCH="${USER_BRANCH:-$DEFAULT_BRANCH}"
            echo "matrix={\"include\":[{\"variant\":\"$VAR\",\"branch\":\"$BRANCH\"}]}" >> "$GITHUB_OUTPUT"
          else
            # push 触发: 编译 KSU 版 (T 分支)
            echo 'matrix={"include":[{"variant":"KernelSU","branch":"T"}]}' >> "$GITHUB_OUTPUT"
          fi

  # ═══════════════════════════════════════════════════════════
  # 内核编译
  # ═══════════════════════════════════════════════════════════
  build:
    name: 编译 ${{ matrix.variant }} (${{ matrix.branch }})
    needs: prepare
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    env:
      # 根据变体设置内核仓库
      KERNEL_REPO_FULL: ${{ matrix.variant == 'KernelSU-Next' && 'supercutefish/KernelSU-NEXT_Mi-ares' || 'WangCghy/KernelSU_ares' }}
      KERNEL_BRANCH: ${{ matrix.branch }}
      KSU_TYPE: ${{ matrix.variant }}

    steps:
      - name: 签出本仓库
        uses: actions/checkout@v4

      - name: 显示编译参数
        run: |
          echo "::group::编译参数"
          echo "KSU 版本: ${KSU_TYPE}"
          echo "内核仓库: ${KERNEL_REPO_FULL}"
          echo "分支: ${KERNEL_BRANCH}"
          echo "defconfig: ${{ github.event.inputs.defconfig || 'ares_user' }}_defconfig"
          echo "工具链: apt clang-18 + lld-18"
          echo "触发方式: ${{ github.event_name }}"
          echo "::endgroup::"

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache cpio curl flex \
            git gnupg libelf-dev libncurses5-dev libssl-dev \
            python3 python3-pip unzip wget zip \
            zstd openssl \
            clang-18 lld-18 llvm-18 \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi
          sudo apt-get clean

      - name: 检查工具链版本
        run: |
          ldd --version | head -n1
          echo "---"
          clang-18 --version | head -n2
          echo "---"
          ld.lld-18 --version

      - name: 克隆内核源码
        run: |
          echo "克隆 ${KERNEL_REPO_FULL} @ ${KERNEL_BRANCH}"
          # 不使用 --depth=1 浅克隆, 因为需要子模块历史来 checkout
          git clone -b "${KERNEL_BRANCH}" "https://github.com/${KERNEL_REPO_FULL}.git" kernel
          cd kernel

          # 尝试初始化子模块, 如果失败则手动处理
          git submodule update --init --recursive || {
            echo "::warning::子模块自动拉取失败, 尝试手动克隆 KernelSU"
            # 手动克隆 KernelSU 到子模块路径 (drivers/kernelsu 是 symlink 指向 KernelSU/)
            KSU_DIR="KernelSU"
            if [ ! -d "$KSU_DIR" ] || [ -z "$(ls -A $KSU_DIR 2>/dev/null)" ]; then
              rm -rf "$KSU_DIR"
              git clone --depth=1 "https://github.com/tiann/KernelSU.git" "$KSU_DIR"
            fi
            # 同样处理小写版本 (如果存在)
            if grep -q 'kernelSU' .gitmodules 2>/dev/null; then
              if [ ! -d "kernelSU" ] || [ -z "$(ls -A kernelSU 2>/dev/null)" ]; then
                rm -rf kernelSU
                git clone --depth=1 "https://github.com/tiann/KernelSU.git" kernelSU
              fi
            fi
          }

          cd ..
          echo "## 内核源码 (${KSU_TYPE})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git -C kernel log -1 --format='提交: %H%n作者: %an%n日期: %ad%n说明: %s' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 配置工具链
        run: |
          # 创建符号链接, 让 build.sh 中的 clang/aarch64-linux-gnu- 等命令能找到系统工具
          mkdir -p "$GITHUB_WORKSPACE/toolchain/bin"
          cd "$GITHUB_WORKSPACE/toolchain/bin"
          ln -sf /usr/bin/clang-18 clang
          ln -sf /usr/bin/ld.lld-18 ld.lld
          ln -sf /usr/bin/llvm-strip-18 llvm-strip
          ln -sf /usr/bin/llvm-as-18 llvm-as
          ln -sf /usr/bin/llvm-ar-18 llvm-ar
          ln -sf /usr/bin/llvm-nm-18 llvm-nm
          ln -sf /usr/bin/llvm-objcopy-18 llvm-objcopy
          ln -sf /usr/bin/llvm-objdump-18 llvm-objdump
          # aarch64 交叉编译工具链 (来自 gcc-aarch64-linux-gnu)
          ln -sf /usr/bin/aarch64-linux-gnu-gcc aarch64-linux-gnu-gcc
          ln -sf /usr/bin/aarch64-linux-gnu-as aarch64-linux-gnu-as
          ln -sf /usr/bin/aarch64-linux-gnu-ld aarch64-linux-gnu-ld
          ln -sf /usr/bin/aarch64-linux-gnu-strip aarch64-linux-gnu-strip
          # arm 32 位交叉编译工具链
          if [ -f /usr/bin/arm-linux-gnueabi-gcc ]; then
            ln -sf /usr/bin/arm-linux-gnueabi-gcc arm-linux-gnueabi-gcc
          fi
          echo "## 工具链" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          clang-18 --version | head -n2 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 编译内核
        run: |
          cd kernel
          DEFCONFIG="${{ github.event.inputs.defconfig || 'ares_user' }}"
          ENABLE_KPROBES="${{ github.event.inputs.enable_kprobes || 'true' }}"
          # 使用系统安装的 clang-18 工具链
          export CLANG_DIR="$GITHUB_WORKSPACE/toolchain"
          export PATH="${CLANG_DIR}/bin:${PATH}"
          bash "$GITHUB_WORKSPACE/build.sh" "$DEFCONFIG" "$ENABLE_KPROBES"

      - name: 校验编译产物
        run: |
          echo "## 编译产物 (${KSU_TYPE})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh kernel/out/arch/arm64/boot/Image* 2>/dev/null || {
            echo "未找到内核镜像, 编译失败"; exit 1;
          }
          echo "" >> $GITHUB_STEP_SUMMARY
          find kernel/out/arch/arm64/boot/dts -name '*.dtb' 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 下载 stock boot.img
        id: dl_boot
        run: |
          BOOT_URL="${{ github.event.inputs.boot_img_url }}"
          if [ -z "$BOOT_URL" ]; then
            echo "::notice::未提供 stock boot.img URL (定时/push 触发无此参数), 跳过 boot.img 生成"
            echo "has_boot=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "下载 stock boot.img: $BOOT_URL"
          curl -L -o stock_boot.img "$BOOT_URL"
          ls -lh stock_boot.img
          # 验证是有效的 boot.img (至少 10MB)
          SIZE=$(stat -c%s stock_boot.img 2>/dev/null || stat -f%z stock_boot.img)
          if [ "$SIZE" -lt 10000000 ]; then
            echo "::error::下载的文件太小 ($SIZE bytes), 可能不是有效的 boot.img"
            exit 1
          fi
          echo "stock boot.img 大小: $(numfmt --to=iec $SIZE)"
          echo "has_boot=true" >> $GITHUB_OUTPUT

      - name: 下载 magiskboot 工具
        if: steps.dl_boot.outputs.has_boot == 'true'
        run: |
          # 从 Magisk releases 获取 magiskboot 二进制 (已包含在 Magisk.apk 内)
          # magiskboot 是 x86_64 Linux ELF 二进制, 可直接在 ubuntu runner 上运行
          curl -L -o magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/${MAGISK_VERSION}/Magisk-${MAGISK_VERSION}.apk"
          ls -lh magisk.apk

          # 从 APK 中提取 magiskboot (位于 lib/x86_64/libmagiskboot.so)
          # 注意: libmagiskboot.so 实际上是独立的 ELF 可执行文件, 不是共享库
          mkdir -p magisk_extract
          cd magisk_extract
          unzip -o ../magisk.apk lib/x86_64/libmagiskboot.so
          ls -lh lib/x86_64/libmagiskboot.so
          file lib/x86_64/libmagiskboot.so

          cp lib/x86_64/libmagiskboot.so ../magiskboot
          chmod +x ../magiskboot
          cd ..

          # 验证 magiskboot 是有效的 ELF 可执行文件
          echo "=== magiskboot 文件信息 ==="
          ls -lh magiskboot
          file magiskboot

          # 检测动态链接依赖
          echo "=== ldd 输出 ==="
          ldd magiskboot || true

          # 测试 magiskboot 能否执行
          # 注意: magiskboot 无参数时会打印 usage 并以非零码退出, 这是正常的
          # 只要能输出 usage 就说明二进制可以运行
          echo "=== magiskboot 无参数输出 (前 5 行) ==="
          ./magiskboot 2>&1 | head -5 || true

          # 最终验证: 用一个空的测试来确认二进制能加载执行
          # 如果 ldd 显示缺少依赖, 这里会失败
          if ! file magiskboot | grep -q "ELF.*executable"; then
            echo "::error::magiskboot 不是有效的 ELF 可执行文件"
            exit 1
          fi
          echo "✅ magiskboot 验证通过"

      - name: 注入内核到 boot.img
        id: inject
        if: steps.dl_boot.outputs.has_boot == 'true'
        run: |
          # 复制 stock boot.img 作为工作副本
          cp stock_boot.img boot.img

          # 用 magiskboot 解包 boot.img
          mkdir -p boot_work && cd boot_work
          ../magiskboot unpack ../boot.img

          # 查看解包结果
          echo "解包后的文件:"
          ls -lh

          # 替换内核
          cp "$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image" kernel

          # 重新打包
          ../magiskboot repack ../boot.img ../new_boot.img
          cd ..

          # 验证新 boot.img
          ls -lh new_boot.img
          NEW_SIZE=$(stat -c%s new_boot.img)
          echo "新 boot.img 大小: $(numfmt --to=iec $NEW_SIZE)"

          # 生成最终文件名
          SUFFIX=$(echo "${KSU_TYPE}" | tr '[:upper:]' '[:lower:]' | sed 's/kernelsu/ksu/; s/-//g')
          BOOT_NAME="${SUFFIX}-boot-$(date -u +%Y%m%d-%H%M).img"
          mv new_boot.img "$BOOT_NAME"
          echo "boot_name=$BOOT_NAME" >> $GITHUB_OUTPUT

          echo "## boot.img 生成完成" >> $GITHUB_STEP_SUMMARY
          echo "文件名: \`$BOOT_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "大小: $(ls -lh "$BOOT_NAME" | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "刷入命令: \`fastboot flash boot $BOOT_NAME\`" >> $GITHUB_STEP_SUMMARY

      - name: 上传 boot.img
        if: steps.dl_boot.outputs.has_boot == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.inject.outputs.boot_name }}
          path: ${{ steps.inject.outputs.boot_name }}
          retention-days: 30
          compression-level: 0

  # ═══════════════════════════════════════════════════════════
  # 发布 Release
  # ═══════════════════════════════════════════════════════════
  release:
    name: 发布 Release
    needs: build
    runs-on: ubuntu-24.04
    # 手动触发、定时、或 push 时发布 (但需要至少有 boot.img)
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push') && github.event.inputs.boot_img_url != ''
    permissions:
      contents: write

    steps:
      - name: 下载所有 boot.img
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: 生成 Release 描述
        run: |
          cat > release-body.md <<'INNEREOF'
          ## 红米 K40 游戏增强版 (ares) KernelSU 内核

          ### 本 Release 包含
          | 文件 | 版本 |
          |------|------|
          INNEREOF
          # 根据实际存在的 img 文件动态生成文件列表
          for f in *.img; do
            if echo "$f" | grep -qi "ksunext"; then
              VER="KernelSU-Next | supercutefish/KernelSU-NEXT_Mi-ares"
            else
              VER="KernelSU | WangCghy/KernelSU_ares"
            fi
            echo "| \`$f\` | $VER |" >> release-body.md
          done
          cat >> release-body.md <<'INNEREOF'

          - 构建编号: INNEREOF
          echo "#${{ github.run_number }}" >> release-body.md
          cat >> release-body.md <<'INNEREOF'
          - defconfig: ares_user_defconfig
          - 触发方式: INNEREOF
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "定时自动 (每周一)" >> release-body.md
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "代码推送自动" >> release-body.md
          else
            echo "手动触发" >> release-body.md
          fi
          cat >> release-body.md <<'INNEREOF'

          ### 刷入方法 (fastboot)
          1. 解锁 BootLoader
          2. 手机进入 fastboot 模式 (关机后按住 电源+音量减)
          3. 连接电脑, 确认 `fastboot devices` 能识别设备
          4. 刷入 boot.img:
          ```
          fastboot flash boot <下载的img文件名>
          fastboot reboot
          ```
          5. 重启后安装 KernelSU Manager 验证

          > ⚠️ 刷错 boot.img 可能导致不开机, 请确保:
          > - boot.img 来自你当前系统版本的固件
          > - 刷入前备份原厂 boot.img (`fastboot boot` 可临时引导不刷入)
          > - 非官方编译, 仅供学习研究, 刷机风险自负
          INNEREOF
          echo "生成的 Release 描述:"
          cat release-body.md

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: KernelSU-ares-${{ github.run_number }}
          name: KernelSU 红米K40G 内核 #${{ github.run_number }}
          body_path: release-body.md
          files: |
            *.img
          prerelease: false
          make_latest: true
